# camera-app — everything the old monster build command line carried, owned here.

# --- USB device (new stack) -------------------------------------------------
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_VIDEO_CLASS=y
CONFIG_UDC_BUF_POOL_SIZE=2048
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# --- Video capture ----------------------------------------------------------
CONFIG_VIDEO=y
# 2x 640x480 RGB565 = 1.2 MB. Pool lives OUTSIDE the image, in the runtime-only
# named region "AXISRAM1" (see app.overlay) — the image itself must stay inside
# the 511 KB BootROM window. Pool budget: W*H*2 bytes * 2 buffers <= 1536 KB.
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=1250000
CONFIG_VIDEO_BUFFER_POOL_ZEPHYR_REGION=y
CONFIG_VIDEO_BUFFER_POOL_ZEPHYR_REGION_NAME="AXISRAM1"

# --- Logging ----------------------------------------------------------------
CONFIG_LOG=y
# LOAD-BEARING, do not remove: synchronous logging. Two reasons:
# 1. Deferred mode + CONFIG_LOG_PRINTK silently drops ALL boot-time output
#    (the 1 KB buffer overflows before the console thread runs) — see
#    CLAUDE.md "Debugging" trap #1.
# 2. The slower boot currently MASKS the imx335 boot-timing race (trap #3);
#    fast deferred-log boots hit the sensor before it is ready and camera
#    init fails. Keep until the race is properly fixed in the driver.
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_USBD_VIDEO_LOG_LEVEL_WRN=y
CONFIG_VIDEO_LOG_LEVEL_WRN=y

# --- Kernel -----------------------------------------------------------------
CONFIG_POLL=y
CONFIG_MAIN_STACK_SIZE=4096
