# Debug aid: make logging fully synchronous so NOTHING is dropped at boot.
# Default deferred mode (1KB buffer) + CONFIG_LOG_PRINTK=y silently dropped all
# init-time messages ("--- 58 messages dropped ---"), including driver LOG_ERRs
# and printk markers — which hid the camera-init failure for several sessions.
# Slower boot (UART-paced), debug-only. Remove from build args for normal use.
CONFIG_LOG_MODE_IMMEDIATE=y
