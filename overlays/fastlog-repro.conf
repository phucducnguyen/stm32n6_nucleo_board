# Repro aid for the imx335 boot-timing race (docs/camera-bringup-debug-log.md).
# Flips logging back to DEFERRED so the DBGMARK printks no longer block on the
# UART — restoring the ORIGINAL fast init timing that triggers the race — but
# with a 32 KB buffer + a real log thread so nothing is dropped and we can still
# read exactly where imx335_init bails. Debug/repro only; never ship this.
CONFIG_LOG_MODE_IMMEDIATE=n
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=32768
CONFIG_LOG_PROCESS_THREAD=y
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=0
